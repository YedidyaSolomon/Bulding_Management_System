<mat-toolbar class="bms-toolbar">

  <!-- ── Left: Menu toggle ────────────────────────────────────── -->
  <button
    mat-icon-button
    class="menu-toggle"
    (click)="onMenuToggle()"
    [matTooltip]="sidenavCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
    <mat-icon>{{ sidenavCollapsed ? 'menu_open' : 'menu' }}</mat-icon>
  </button>

  <!-- ── Breadcrumb / Page title (dynamic later) ──────────────── -->
  <div class="toolbar-title">
    <span class="app-name">Building Management System</span>
  </div>

  <span class="toolbar-spacer"></span>

  <!-- ── Right actions ────────────────────────────────────────── -->

  <!-- Notifications bell -->
  <button
    mat-icon-button
    [routerLink]="['/notifications']"
    [matTooltip]="'Notifications'"
    class="toolbar-action">
    <mat-icon
      [matBadge]="unreadNotifications > 0 ? unreadNotifications : ''"
      matBadgeColor="warn"
      matBadgeSize="small">
      notifications
    </mat-icon>
  </button>

  <!-- User profile menu -->
  <button
    mat-button
    [matMenuTriggerFor]="profileMenu"
    class="profile-btn"
    *ngIf="currentUser">
    <div class="profile-avatar">{{ getInitials(currentUser.fullName) }}</div>
    <div class="profile-info">
      <span class="profile-name">{{ currentUser.fullName }}</span>
      <span class="profile-role-badge role-{{ currentUser.role.toLowerCase() }}">{{ currentUser.role }}</span>
    </div>
    <mat-icon class="profile-chevron">expand_more</mat-icon>
  </button>

  <mat-menu #profileMenu="matMenu" class="profile-menu" xPosition="before">
    <div class="menu-header" *ngIf="currentUser">
      <div class="menu-avatar">{{ getInitials(currentUser.fullName) }}</div>
      <div class="menu-user-info">
        <div class="menu-name">{{ currentUser.fullName }}</div>
        <span class="menu-role-badge role-{{ currentUser.role.toLowerCase() }}">{{ currentUser.role }}</span>
        <div class="menu-status">
          <span class="menu-status-dot"></span>
          Active
        </div>
      </div>
    </div>
    <mat-divider />
    <button mat-menu-item>
      <mat-icon>account_circle</mat-icon>
      <span>Profile</span>
    </button>
    <button mat-menu-item>
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <mat-divider />
    <button mat-menu-item (click)="logout()" class="logout-item">
      <mat-icon>logout</mat-icon>
      <span>Sign out</span>
    </button>
  </mat-menu>

</mat-toolbar>
