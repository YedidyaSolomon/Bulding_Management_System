<div class="unit-card bms-card">

  <!-- ── Card header: icon + unit number + floor badge + status pill ── -->
  <div class="card-header">
    <div class="card-title">
      <!-- Icon changes per unit type -->
      <div class="unit-avatar unit-avatar--{{ unit.unitType.toLowerCase() }}" aria-hidden="true">
        <mat-icon>{{ unitTypeIcon(unit.unitType) }}</mat-icon>
      </div>
      <div>
        <span class="unit-number">{{ unit.unitNumber }}</span>
        <span class="floor-badge">Floor {{ unit.floorNumber }}</span>
      </div>
    </div>
    <span class="badge" [ngClass]="statusClass(unit.status)">
      {{ statusLabel(unit.status) }}
    </span>
  </div>

  <!-- ── Card body: detail rows ───────────────────────────────────── -->
  <div class="card-body">
    <div class="card-row">
      <span class="card-label">Type</span>
      <span class="card-value">{{ unit.unitType }}</span>
    </div>
    <div class="card-row">
      <span class="card-label">Area</span>
      <span class="card-value">{{ unit.areaSqMeters | number:'1.0-1' }} m²</span>
    </div>
    <div class="card-row">
      <span class="card-label">Monthly Rent</span>
      <span class="card-value rent-value">{{ unit.monthlyRent | etbCurrency }}</span>
    </div>
  </div>

  <!-- ── Card footer: labelled actions ───────────────────────────── -->
  <div class="card-actions">
    <!-- "View details" is always visible — text + icon so it reads as clickable -->
    <button
      mat-button
      class="action-btn action-btn--view"
      (click)="view.emit(unit)"
      matTooltip="View full details">
      <mat-icon>chevron_right</mat-icon>
      View details
    </button>

    <div class="action-btn-right">
      <!-- Edit — Admin / Manager only -->
      <button
        *ngIf="canEdit"
        mat-icon-button
        class="action-icon-btn"
        (click)="edit.emit(unit)"
        matTooltip="Edit unit">
        <mat-icon>edit</mat-icon>
      </button>

      <!-- Delete — Admin only -->
      <button
        *ngIf="canDelete"
        mat-icon-button
        class="action-icon-btn action-icon-btn--delete"
        (click)="delete.emit(unit)"
        matTooltip="Delete unit">
        <mat-icon>delete_outline</mat-icon>
      </button>
    </div>
  </div>

</div>
